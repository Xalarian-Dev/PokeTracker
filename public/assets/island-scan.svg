<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="24" height="24" fill="#FFFFFF" rx="2"/>
  
  <!-- QR code style border -->
  <rect x="2" y="2" width="5" height="5" fill="#000" />
  <rect x="3" y="3" width="3" height="3" fill="#fff" />
  
  <rect x="17" y="2" width="5" height="5" fill="#000" />
  <rect x="18" y="3" width="3" height="3" fill="#fff" />
  
  <rect x="2" y="17" width="5" height="5" fill="#000" />
  <rect x="3" y="18" width="3" height="3" fill="#fff" />
  
  <!-- QR pattern elements -->
  <rect x="9" y="2" width="2" height="2" fill="#000" />
  <rect x="13" y="2" width="2" height="2" fill="#000" />
  <rect x="2" y="9" width="2" height="2" fill="#000" />
  <rect x="2" y="13" width="2" height="2" fill="#000" />
  <rect x="20" y="9" width="2" height="2" fill="#000" />
  <rect x="20" y="13" width="2" height="2" fill="#000" />
  <rect x="9" y="20" width="2" height="2" fill="#000" />
  <rect x="13" y="20" width="2" height="2" fill="#000" />
  
  <!-- Central question mark -->
  <circle cx="12" cy="12" r="5" fill="#5B21B6" />
  <text x="12" y="16" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">?</text>
</svg>
